<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Background glow */
    .glow-tl {
      position: absolute;
      top: -200px; left: -100px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(41,182,246,0.18) 0%, transparent 65%);
      pointer-events: none;
    }
    .glow-br {
      position: absolute;
      bottom: -200px; right: -100px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(41,182,246,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Grid lines */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Main layout */
    .container {
      position: relative;
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 100px;
      z-index: 1;
    }

    /* Left: text */
    .left {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #29B6F6;
      margin-bottom: 24px;
    }
    .eyebrow-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #29B6F6;
    }

    .brand {
      font-size: 88px;
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 0.9;
      color: #fff;
      margin-bottom: 6px;
    }
    .brand em {
      font-style: normal;
      color: #29B6F6;
    }

    .tagline {
      font-size: 22px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      letter-spacing: -0.3px;
      margin-top: 20px;
      max-width: 420px;
      line-height: 1.5;
    }

    .badge {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(41,182,246,0.1);
      border: 1px solid rgba(41,182,246,0.25);
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #29B6F6;
      width: fit-content;
    }

    /* Right: watch mockup */
    .right {
      position: relative;
      flex-shrink: 0;
    }

    .watch-glow {
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(41,182,246,0.2) 0%, transparent 65%);
    }

    .watch {
      width: 320px;
      height: 320px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 8px rgba(255,255,255,0.025),
        0 0 0 16px rgba(255,255,255,0.01),
        0 48px 96px rgba(0,0,0,0.9);
    }

    .watch-inner {
      width: 480px;
      height: 480px;
      transform: scale(0.6667);
      transform-origin: top left;
      position: absolute;
      top: 0; left: 0;
    }

    /* Domain */
    .domain {
      position: absolute;
      bottom: 44px;
      left: 100px;
      font-size: 15px;
      font-weight: 500;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="grid"></div>

  <div class="container">
    <!-- LEFT -->
    <div class="left">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        Zepp OS · Amazfit Balance
      </div>
      <div class="brand">Padel<em>Deck</em></div>
      <div class="tagline">Track every point, game and set<br>directly from your wrist.</div>
      <div class="badge">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="#29B6F6" stroke-width="1.5"/>
          <path d="M7 4v3l2 1.5" stroke="#29B6F6" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Coming to Zepp Marketplace
      </div>
    </div>

    <!-- RIGHT: score screen -->
    <div class="right">
      <div class="watch-glow"></div>
      <div class="watch">
        <div class="watch-inner">
          <div style="position:absolute;inset:0;background:#000"></div>
          <!-- THEM zone -->
          <div style="position:absolute;left:0;top:0;width:480px;height:235px;background:#29b6f6"></div>
          <!-- WE zone -->
          <div style="position:absolute;left:0;top:245px;width:480px;height:235px;background:#0a1929"></div>
          <!-- THEM score -->
          <div style="position:absolute;left:120px;top:68px;width:240px;height:100px;display:flex;align-items:center;justify-content:center;font-size:88px;color:#fff;font-weight:800;line-height:1">40</div>
          <!-- THEM label -->
          <div style="position:absolute;left:0;top:170px;width:480px;height:24px;display:flex;align-items:center;justify-content:center;font-size:16px;color:rgba(255,255,255,0.55);font-weight:700;letter-spacing:3px">T H E M</div>
          <!-- WE score -->
          <div style="position:absolute;left:120px;top:313px;width:240px;height:100px;display:flex;align-items:center;justify-content:center;font-size:88px;color:#fff;font-weight:800;line-height:1">A</div>
          <!-- US label -->
          <div style="position:absolute;left:0;top:284px;width:480px;height:24px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#29b6f6;font-weight:700;letter-spacing:5px">U S</div>
          <!-- Island BG -->
          <div style="position:absolute;left:52px;top:202px;width:376px;height:76px;border-radius:14px;background:#1e1e1e"></div>
          <!-- Undo -->
          <div style="position:absolute;left:52px;top:202px;width:52px;height:76px;border-radius:14px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:24px;color:#555">↺</div>
          <!-- Divider -->
          <div style="position:absolute;left:104px;top:210px;width:1px;height:60px;background:#282828"></div>
          <!-- Serve cells -->
          <div style="position:absolute;left:105px;top:202px;width:36px;height:38px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#29b6f6;font-weight:700">1</div>
          <div style="position:absolute;left:141px;top:202px;width:36px;height:38px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#2a2a2a">●</div>
          <div style="position:absolute;left:105px;top:240px;width:36px;height:38px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#1e1e1e">●</div>
          <div style="position:absolute;left:141px;top:240px;width:36px;height:38px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#145b7b">●</div>
          <!-- Arrow -->
          <div style="position:absolute;left:105px;top:202px;width:72px;height:76px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#29b6f6;opacity:0.85">↘</div>
          <!-- Divider -->
          <div style="position:absolute;left:177px;top:210px;width:1px;height:60px;background:#282828"></div>
          <!-- Clock -->
          <div style="position:absolute;left:178px;top:202px;width:177px;height:76px;display:flex;align-items:center;justify-content:center;font-size:33px;color:#999;font-weight:400;letter-spacing:1px">14:32</div>
          <!-- Divider -->
          <div style="position:absolute;left:355px;top:209px;width:1px;height:62px;background:#282828"></div>
          <!-- Set grid -->
          <div style="position:absolute;left:356px;top:202px;width:24px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#404040;font-weight:700">4</div>
          <div style="position:absolute;left:356px;top:240px;width:24px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#404040;font-weight:700">6</div>
          <div style="position:absolute;left:380px;top:202px;width:24px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#999;font-weight:700">3</div>
          <div style="position:absolute;left:380px;top:240px;width:24px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#29b6f6;font-weight:700">2</div>
          <div style="position:absolute;left:404px;top:202px;width:24px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#2a2a2a;font-weight:700">–</div>
          <div style="position:absolute;left:404px;top:240px;width:24px;height:38px;display:flex;align-items:center;justify-content:center;font-size:21px;color:#2a2a2a;font-weight:700">–</div>
        </div>
      </div>
    </div>
  </div>

  <div class="domain">padeldeck.app</div>

</body>
</html>
